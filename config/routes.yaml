# =====================================================================
#  Правила маршрутизации сообщений
# =====================================================================
#
#  Бот слушает топики супергруппы-ИСТОЧНИКА и пересылает сообщения
#  (текст, фото, PDF, DOCX и любые вложения) в топики
#  супергруппы-НАЗНАЧЕНИЯ.
#
#  Маршрут срабатывает, если:
#    1) сообщение пришло из топика source_thread_id в чате source_chat_id
#    2) И сообщение содержит хотя бы один из хэштегов match_hashtags
#
#  Ссылки t.me/c/<chat>/<thread>:  chat_id = -100 + <chat>.
# =====================================================================

# Супергруппа-источник: https://t.me/c/2447388676/...
source_chat_id: -1002447388676

# Супергруппа-назначение: https://t.me/c/3662082624/...
dest_chat_id: -1003662082624

# Хэштеги-фильтр (одинаковые для всех маршрутов).
# Сообщение пересылается, только если содержит хотя бы один из них.
routes:
  - name: "Топик 9 -> 2"
    source_thread_id: 9            # t.me/c/2447388676/9
    match_hashtags: ["#кухня", "#бар", "#кальяны", "#хозка"]
    dest_thread_id: 2             # t.me/c/3662082624/2

  - name: "Топик 8 -> 3"
    source_thread_id: 8            # t.me/c/2447388676/8
    match_hashtags: ["#кухня", "#бар", "#кальяны", "#хозка"]
    dest_thread_id: 3             # t.me/c/3662082624/3

  - name: "Топик 7939 -> 5"
    source_thread_id: 7939         # t.me/c/2447388676/7939
    match_hashtags: ["#кухня", "#бар", "#кальяны", "#хозка"]
    dest_thread_id: 5             # t.me/c/3662082624/5

  - name: "Топик 7938 -> 4"
    source_thread_id: 7938         # t.me/c/2447388676/7938
    match_hashtags: ["#кухня", "#бар", "#кальяны", "#хозка"]
    dest_thread_id: 4             # t.me/c/3662082624/4
